<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Nexus Corp</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


    <!--
🚨 CYBER SECURITY NOTICE 🚨

This system is under active surveillance by the Government of Nigeria Cyber Defense Unit.

Unauthorized actions including:
- Vulnerability scanning
- Traffic interception
- Code analysis
- Exploitation attempts

will be treated as cybercrime offenses under the IT Act 2000.

<body class="login-body">
    <div class="split-screen">
        <div class="left-panel">
            <div class="glass-overlay">
                <div class="brand">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M12 2L2 7L12 12LC12 12L22 7L12 2Z"></path>
                        <path d="M2 17L12 22L22 17"></path>
                        <path d="M2 12L12 17L22 12"></path>
                    </svg>
                    <h1>Nexus Corp</h1>
                </div>
                <div class="hero-text">
                    <h2>Future of Secure Data</h2>
                    <p>Access the world's most advanced secure infrastructure.</p>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-box">
                <div class="login-header">
                    <h2>Welcome back</h2>
                    <p class="subtitle">Enter your credentials to access your account.</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="alice" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-footer">
                        <div class="checkbox">
                            <input type="checkbox" id="remember">
                            <label for="remember">Keep me logged in</label>
                        </div>
                        <a href="#" class="forgot-password">Recovery?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>Sign In</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <div id="message" class="message"></div>

                <div class="footer-text">
                    Restricted Access. Authorized Personnel Only.
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.classList.add('loading');
            messageDiv.style.opacity = '0';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                submitBtn.classList.remove('loading');

                if (data.status === 'success') {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Access Granted. Redirecting...';
                    messageDiv.style.opacity = '1';
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || 'Access Denied';
                    messageDiv.style.opacity = '1';

                    const form = document.querySelector('.login-box');
                    form.animate([
                        { transform: 'translateX(0)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(0)' }
                    ], {
                        duration: 400
                    });
                }
            } catch (error) {
                submitBtn.classList.remove('loading');
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection Error.';
                messageDiv.style.opacity = '1';
            }
        });
    </script>
</body>
